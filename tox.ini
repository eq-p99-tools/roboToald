[tox]
minversion = 4.0
envlist = lint, test
isolated_build = true

[testenv:lint]
description = Ruff lint and format check (read-only). Use env "format" to write formatted files.
skip_install = true
deps = ruff
commands =
    ruff check {posargs:.}
    ruff format --check {posargs:.}

# Non-default: omit from envlist so `tox` only runs lint + test. Apply formatting with: tox -e format
[testenv:format]
description = Apply ruff formatting and safe auto-fixes (writes files)
skip_install = true
deps = ruff
commands =
    ruff format {posargs:.}
    ruff check --fix {posargs:.}

[testenv:test]
description = Run unit tests with pytest
extras = dev
commands = pytest {posargs}
