[tox]
envlist = lint, test
skipsdist = true

[testenv:lint]
description = Run ruff linter and format check
deps = ruff
commands =
    ruff check {posargs:.}
    ruff format --check {posargs:.}

[testenv:format]
description = Auto-format code with ruff
deps = ruff
commands =
    ruff format {posargs:.}
    ruff check --fix {posargs:.}

[testenv:test]
description = Run unit tests with pytest
deps =
    -r requirements.txt
    pytest
setenv =
    PYTHONPATH = {toxinidir}
commands = pytest {posargs}
