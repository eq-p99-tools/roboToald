[tox]
minversion = 4.0
envlist = lint, test
isolated_build = true

# Shared lint/format env names with p99-login-proxy/tox.ini; this project adds test/cov for pytest.

[testenv:lint]
description = Ruff lint and format check (read-only). Use env "format" to write formatted files.
skip_install = true
deps = ruff
commands =
    ruff check {posargs:.}
    ruff format --check {posargs:.}

# Non-default: omit from envlist so `tox` only runs lint + test. Apply formatting with: tox -e format
[testenv:format]
description = Apply ruff formatting and safe auto-fixes (writes files)
skip_install = true
deps = ruff
commands =
    ruff format {posargs:.}
    ruff check --fix {posargs:.}

[testenv:test]
description = Run unit tests with pytest and a terminal coverage report
extras = dev
commands =
    pytest --cov=roboToald --cov-report=term-missing {posargs:tests}

[testenv:cov]
description = Tests plus HTML coverage report (htmlcov/index.html). Add e.g. --cov-fail-under=40 via posargs when ready to enforce a floor
extras = dev
commands =
    pytest --cov=roboToald --cov-report=term-missing --cov-report=html {posargs:tests}
