[tox]
minversion = 4.0
envlist = lint, test
isolated_build = true

[testenv:lint]
description = Run ruff linter and format check
skip_install = true
deps = ruff
commands =
    ruff check {posargs:.}
    ruff format --check {posargs:.}

[testenv:format]
description = Auto-format code with ruff
skip_install = true
deps = ruff
commands =
    ruff format {posargs:.}
    ruff check --fix {posargs:.}

[testenv:test]
description = Run unit tests with pytest
extras = dev
commands = pytest {posargs}
