{% if rate_limited %}
<div style="overflow-x: auto;">
<table>
    <thead>
        <tr>
            <th>IP Hash</th>
            <th>Failed Attempts</th>
        </tr>
    </thead>
    <tbody>
        {% for cc, ip, count in rate_limited %}
        <tr>
            <td style="white-space: nowrap;">{% if cc == 'private' %}&#x1F512;{% elif cc %}<span class="fi fi-{{ cc }}"></span>{% endif %} {{ ip }}</td>
            <td>{{ count }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% else %}
<p class="empty-state">No rate-limited IPs</p>
{% endif %}
