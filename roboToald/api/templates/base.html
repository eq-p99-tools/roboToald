<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SSO Admin Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --pico-font-size: 15px;
        }
        body > nav {
            padding: 0.5rem 1rem;
            margin-bottom: 0;
        }
        nav .brand {
            font-weight: 700;
            font-size: 1.1rem;
        }
        main {
            padding: 1rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            text-align: center;
            padding: 1rem;
            border-radius: 8px;
            background: var(--pico-card-background-color);
            border: 1px solid var(--pico-muted-border-color);
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .stat-card .label {
            font-size: 0.85rem;
            color: var(--pico-muted-color);
        }
        table {
            font-size: 0.9rem;
        }
        .badge {
            display: inline-block;
            padding: 0.15em 0.5em;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-success {
            background: #2d6a4f;
            color: #d8f3dc;
        }
        .badge-danger {
            background: #6a2d2d;
            color: #f3d8d8;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .section-header h3 {
            margin: 0;
        }
        .section-header small {
            color: var(--pico-muted-color);
        }
        .htmx-indicator {
            opacity: 0;
            transition: opacity 200ms ease-in;
        }
        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            opacity: 1;
        }
        .guild-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .guild-stat {
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            background: var(--pico-card-background-color);
            border: 1px solid var(--pico-muted-border-color);
            font-size: 0.85rem;
        }
        .guild-stat strong {
            display: block;
            margin-bottom: 0.25rem;
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--pico-muted-color);
        }
        .dashboard-section {
            margin-bottom: 2rem;
        }
        #refresh-select {
            display: inline-block;
            width: auto;
            padding: 0.25rem 0.5rem;
            font-size: 0.85rem;
            margin: 0;
            height: auto;
            vertical-align: middle;
        }
        .nav-control {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--pico-muted-color);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav>
        <ul>
            <li><span class="brand">SSO Admin Dashboard</span></li>
        </ul>
        <ul>
            {% block nav_right %}{% endblock %}
        </ul>
    </nav>
    <main class="container-fluid">
        {% block content %}{% endblock %}
    </main>
    <script>
    function formatLocalTimes(root) {
        (root || document).querySelectorAll('time.local-time').forEach(function(el) {
            if (el.dataset.formatted) return;
            var d = new Date(el.getAttribute('datetime'));
            if (!isNaN(d)) {
                el.textContent = d.toLocaleString(undefined, {
                    month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
            }
            el.dataset.formatted = '1';
        });
    }
    formatLocalTimes();
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        formatLocalTimes(evt.detail.target);
    });
    </script>
</body>
</html>
